<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Encrypted Chat</title>
        <link rel="stylesheet" href="./styles.css">
        <script type="module" src="./client.js"></script>
        <meta name="viewport" content="width=device-width, user-scalable=no viewport-fit=cover">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="theme-color" media="(prefers-color-scheme: light)" content="#eff1f5">
        <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1e1e2e">
        <link rel="icon" href="./assets/favicon.png" type="image/png">
    </head>
    <body>
        <div id="chat_container">
            <div id="chat_history"> </div>
        </div>

        <div id="bottom_bar">
            <div id="name_and_encryption">
                <input id="name" type="text" name="name" placeholder="Name">
                <input id="encryption" type="text" name="encryption" placeholder="Password">
            </div>
            <div id="text_and_send">
                <input id="textbox" type="text" name="textbox" placeholder="Message...">
                <button aria-label="Send" id="send" class="right square">
                    <svg width="300" height="300" viewBox="0 0 300 300" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 143.679C92.1308 170.458 197.8 152.634 278.234 142.39"
                            stroke="var(--rosewater)" stroke-linecap="round" stroke-width="30"/>
                        <path d="M194.468 55.6679C194.468 55.6679 277.782 117.043 281.191 141.983C283.503 158.906 198.344 248.881 198.344 248.881"
                            stroke="var(--rosewater)" stroke-linecap="round" stroke-width="30"/>
                    </svg>
                </button>
            </div>
        </div>

        <div id="toast">
            <div id="toast-icon"></div>
            <span id="toast-text"></span>
        </div>
    </body>
</html>
